name: Windows

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LEGAL'
      - 'LICENSE'
      - 'lib/xdg/**'
      - 'snap/**'
      - 'Telegram/build/docker/**'
      - 'Telegram/SourceFiles/platform/linux/**'
      - 'Telegram/SourceFiles/platform/mac/**'
      - 'Telegram/configure.sh'
      - 'Telegram/Telegram.plist'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  windows:
    name: Windows ${{ matrix.arch_label }} build
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            arch_label: x64
            libs_subdir: '\win64'
          - arch: x64_x86
            arch_label: x86
            libs_subdir: ''
          - arch: arm64
            arch_label: arm64
            libs_subdir: ''

    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries${{ matrix.libs_subdir }}>>%GITHUB_ENV%

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: Apply Opengram RSA public key.
        shell: bash
        env:
          OPENGRAM_PUBKEY: ${{ secrets.OPENGRAM_PUBKEY }}
        run: |
          cd "$TBUILD/$REPO_NAME"
          if [ -z "$OPENGRAM_PUBKEY" ]; then
            echo "::warning::OPENGRAM_PUBKEY secret is not set — build won't connect to the server."
          else
            printf '%s\n' "$OPENGRAM_PUBKEY" > pubkey.asc
            python _apply_pubkey.py
            echo "Public key applied."
          fi

      - name: Read SDK version.
        shell: bash
        run: |
          DOCPATH=$TBUILD/$REPO_NAME/docs/building-win.md
          SDK="$(grep "SDK version" $DOCPATH | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "ci@opengra.me"
          git config --global user.name "Opengram CI"

      - uses: ilammy/msvc-dev-cmd@v1
        name: Native Tools Command Prompt.
        with:
          arch: ${{ matrix.arch }}
          sdk: ${{ env.SDK }}

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        uses: actions/cache@v4
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-${{ matrix.arch }}-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-third-party-

      - name: Libraries cache.
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}\*
            !${{ env.LibrariesPath }}\cache_keys
            !${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\*
            !${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-libs-

      - name: Qt cache.
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-${{ matrix.arch }}-qt6-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-qt6-

      - name: Libraries.
        env:
          GYP_MSVS_OVERRIDE_PATH: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\'
          GYP_MSVS_VERSION: 2022
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat skip-release silent qt6

      - name: Build Opengram Desktop.
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          set ARCH_FLAG=x64
          if "${{ matrix.arch }}"=="x64_x86" set ARCH_FLAG=x86
          if "${{ matrix.arch }}"=="arm64" set ARCH_FLAG=arm

          call configure.bat qt6 %ARCH_FLAG% ^
          -D CMAKE_BUILD_TYPE=Release ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT= ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON

          cmake --build ..\out --config Release --parallel

      - name: Package artifact.
        run: |
          set OUT=%TBUILD%\%REPO_NAME%\out\Release
          mkdir artifact
          if exist %OUT%\Opengram.exe move %OUT%\Opengram.exe artifact\
          if exist %OUT%\Telegram.exe move %OUT%\Telegram.exe artifact\Opengram.exe
          if exist %OUT%\Updater.exe move %OUT%\Updater.exe artifact\

      - uses: actions/upload-artifact@v4
        name: Upload artifact.
        with:
          name: opengram-windows-${{ matrix.arch_label }}
          path: artifact\
          retention-days: 30

      - name: Attach to release.
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
