name: Linux

on:
  # Auto-build on push is disabled — every commit on master shouldn't burn
  # GitHub-hosted runner time. Trigger manually via the "Run workflow"
  # button on the Actions tab, or it'll fire on PR / release.
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  linux:
    name: Ubuntu build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      IMAGE_TAG: opengram:env

    steps:
      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Opengram RSA public key.
        env:
          OPENGRAM_PUBKEY: ${{ secrets.OPENGRAM_PUBKEY }}
        run: |
          if [ -z "$OPENGRAM_PUBKEY" ]; then
            echo "::warning::OPENGRAM_PUBKEY secret is not set — build will use placeholder key and won't connect to the server."
          else
            printf '%s\n' "$OPENGRAM_PUBKEY" > pubkey.asc
            python3 _apply_pubkey.py
            echo "Public key applied."
          fi

      - name: Free up disk space.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Generate Dockerfile.
        run: |
          sudo apt update
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"
          cd Telegram/build/docker/centos_env
          poetry install
          DOCKERFILE=$(DEBUG= LTO=ON poetry run gen_dockerfile)
          echo "$DOCKERFILE" > Dockerfile
          rm -rf __pycache__

      - name: Set up Docker Buildx.
        uses: docker/setup-buildx-action@v3

      - name: Build environment image (cached).
        uses: docker/build-push-action@v5
        with:
          context: Telegram/build/docker/centos_env
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=env
          cache-to: type=gha,scope=env,mode=max

      - name: Build Opengram Desktop.
        env:
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID || '17349' }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH || '344583e45741c457fe1862106095a5eb' }}
        run: |
          docker run --rm \
            -u $(id -u) \
            -v $PWD:/usr/src/tdesktop \
            -e CONFIG=Release \
            -e TDESKTOP_API_ID \
            -e TDESKTOP_API_HASH \
            $IMAGE_TAG \
            /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_CONFIGURATION_TYPES=Release \
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON \
            -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
            -D DESKTOP_APP_ENABLE_LTO=ON \
            -D TDESKTOP_API_ID=$TDESKTOP_API_ID \
            -D TDESKTOP_API_HASH=$TDESKTOP_API_HASH

      - name: Verify build output.
        run: |
          filePath=$(find out/Release -maxdepth 1 -name "Opengram" -o -name "Telegram" | head -1)
          if [ -z "$filePath" ] || [ ! -f "$filePath" ]; then
            echo "::error::Build output not found."
            ls -la out/Release/ || true
            exit 1
          fi
          echo "BINARY_PATH=$filePath" >> $GITHUB_ENV
          size=$(stat -c %s "$filePath")
          echo "Built $filePath (${size} bytes)."

      - name: Package artifact.
        run: |
          cd out/Release
          mkdir -p opengram-linux-x64
          cp "$(basename "${{ env.BINARY_PATH }}")" opengram-linux-x64/Opengram 2>/dev/null || cp Telegram opengram-linux-x64/Opengram
          [ -f Updater ] && cp Updater opengram-linux-x64/
          tar -cJf opengram-linux-x64.tar.xz opengram-linux-x64

      - name: Upload artifact.
        uses: actions/upload-artifact@v7
        with:
          name: opengram-linux-x64
          path: out/Release/opengram-linux-x64.tar.xz
          retention-days: 30

      - name: Attach to release.
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/Release/opengram-linux-x64.tar.xz
