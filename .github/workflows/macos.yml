name: macOS

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'LEGAL'
      - 'LICENSE'
      - 'lib/xdg/**'
      - 'snap/**'
      - 'Telegram/build/docker/**'
      - 'Telegram/Resources/uwp/**'
      - 'Telegram/Resources/winrc/**'
      - 'Telegram/SourceFiles/platform/win/**'
      - 'Telegram/SourceFiles/platform/linux/**'
      - 'Telegram/configure.bat'
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  macos:
    name: macOS ${{ matrix.arch }} build
    runs-on: ${{ matrix.arch == 'arm64' && 'macos-14' || 'macos-13' }}
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    steps:
      - name: Get repository name.
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.REPO_NAME }}

      - name: Apply Opengram RSA public key.
        env:
          OPENGRAM_PUBKEY: ${{ secrets.OPENGRAM_PUBKEY }}
        run: |
          cd "$REPO_NAME"
          if [ -z "$OPENGRAM_PUBKEY" ]; then
            echo "::warning::OPENGRAM_PUBKEY secret is not set — build won't connect to the server."
          else
            printf '%s\n' "$OPENGRAM_PUBKEY" > pubkey.asc
            python3 _apply_pubkey.py
            echo "Public key applied."
          fi

      - name: First set up.
        run: |
          sudo chown -R `whoami`:admin /usr/local/share

          brew update
          brew upgrade || true
          brew install automake meson nasm ninja pkg-config

          sudo mdutil -a -i off
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

          if [ -f /opt/homebrew/share/cmake/Modules/Compiler/GNU.cmake ]; then
            sudo sed -i '' '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/ -g//' /opt/homebrew/share/cmake/Modules/Compiler/GNU.cmake
          fi

      - name: Libraries cache.
        uses: actions/cache@v4
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ runner.OS }}-${{ matrix.arch }}-libs-${{ hashFiles(format('{0}/{1}', env.REPO_NAME, env.PREPARE_PATH)) }}
          restore-keys: ${{ runner.OS }}-${{ matrix.arch }}-libs-

      - name: Libraries.
        run: ./$REPO_NAME/Telegram/build/prepare/mac.sh silent

      - name: Build Opengram Desktop.
        env:
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID || '17349' }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH || '344583e45741c457fe1862106095a5eb' }}
        run: |
          cd $REPO_NAME/Telegram

          ./configure.sh \
          -D CMAKE_BUILD_TYPE=Release \
          -D CMAKE_CONFIGURATION_TYPES=Release \
          -D CMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON \
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON \
          -D DESKTOP_APP_DISABLE_SWIFT6=ON \
          -D TDESKTOP_API_ID=$TDESKTOP_API_ID \
          -D TDESKTOP_API_HASH=$TDESKTOP_API_HASH

          cmake --build ../out --config Release --parallel

      - name: Package artifact.
        run: |
          cd $REPO_NAME/out/Release
          mkdir artifact
          if [ -d "Opengram.app" ]; then
            mv Opengram.app artifact/
          elif [ -d "Telegram.app" ]; then
            mv Telegram.app artifact/Opengram.app
          fi
          [ -f Updater ] && mv Updater artifact/

          cd artifact
          tar -cJf "opengram-macos-${{ matrix.arch }}.tar.xz" Opengram.app Updater 2>/dev/null || tar -cJf "opengram-macos-${{ matrix.arch }}.tar.xz" Opengram.app

      - uses: actions/upload-artifact@v4
        name: Upload artifact.
        with:
          name: opengram-macos-${{ matrix.arch }}
          path: ${{ env.REPO_NAME }}/out/Release/artifact/opengram-macos-${{ matrix.arch }}.tar.xz
          retention-days: 30

      - name: Attach to release.
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.REPO_NAME }}/out/Release/artifact/opengram-macos-${{ matrix.arch }}.tar.xz
