name: Windows x86

# x86 cross-build (HostX64→x86) doesn't share library cache with the x64
# build and burns ~3h on prepare alone — kept in a separate workflow so it
# only runs when explicitly asked, instead of blocking every x64/arm64 push.
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  windows-x86:
    name: Windows x86 build
    runs-on: windows-latest
    # x86 prepare alone is ~3h; the full build can graze the 6h hard cap.
    timeout-minutes: 360

    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories.
        # x86 cross-build with Qt 6.11 static + Telegram targets needs ~80 GB
        # of disk between prepare libs and build .obj/.pdb. windows-latest
        # is documented as a 14 GB SSD runner; in practice the C: drive
        # holds ~150 GB total and D: is sometimes present with extra space.
        # Pick the drive with the most free space at runtime and host TBuild
        # there, then symlink it back into %userprofile% / %GITHUB_WORKSPACE%
        # so the rest of the workflow uses the standard paths.
        shell: pwsh
        run: |
          $candidates = @('D:\','C:\') | Where-Object { Test-Path $_ }
          $best = $null
          foreach ($drv in $candidates) {
            $free = (Get-PSDrive -Name $drv.TrimEnd(':\')).Free
            Write-Host ("{0} free: {1:N1} GB" -f $drv, ($free / 1GB))
            if (-not $best -or $free -gt $best.Free) {
              $best = [PSCustomObject]@{ Drive = $drv; Free = $free }
            }
          }
          $tbuildHost = (Join-Path $best.Drive 'TBuild')
          Write-Host "Hosting TBuild on $tbuildHost"
          New-Item -ItemType Directory -Force -Path $tbuildHost | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $tbuildHost 'Libraries') | Out-Null

          $userTBuild = Join-Path $env:USERPROFILE 'TBuild'
          $wsTBuild   = Join-Path $env:GITHUB_WORKSPACE 'TBuild'
          # Only create a junction if the path isn't already the host target.
          if ((Resolve-Path $userTBuild -ErrorAction SilentlyContinue).Path -ne $tbuildHost) {
            cmd /c mklink /d "$userTBuild" "$tbuildHost"
          }
          if ((Resolve-Path $wsTBuild -ErrorAction SilentlyContinue).Path -ne $tbuildHost) {
            cmd /c mklink /d "$wsTBuild" "$tbuildHost"
          }

          "TBUILD=$wsTBuild"          | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "LibrariesPath=$wsTBuild\Libraries" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Get repository name.
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: Apply Opengram RSA public key.
        shell: bash
        env:
          OPENGRAM_PUBKEY: ${{ secrets.OPENGRAM_PUBKEY }}
        run: |
          cd "$TBUILD/$REPO_NAME"
          if [ -z "$OPENGRAM_PUBKEY" ]; then
            echo "::warning::OPENGRAM_PUBKEY secret is not set — build won't connect to the server."
          else
            printf '%s\n' "$OPENGRAM_PUBKEY" > pubkey.asc
            python _apply_pubkey.py
            echo "Public key applied."
          fi

      - name: Read SDK version.
        shell: bash
        run: |
          DOCPATH=$TBUILD/$REPO_NAME/docs/building-win.md
          SDK="$(grep "SDK version" $DOCPATH | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "ci@opengra.me"
          git config --global user.name "Opengram CI"

      - uses: ilammy/msvc-dev-cmd@v1
        name: Native Tools Command Prompt.
        with:
          arch: x64_x86
          sdk: ${{ env.SDK }}

      - name: NuGet sources.
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: ThirdParty cache.
        uses: actions/cache@v5
        with:
          path: ${{ env.TBUILD }}\ThirdParty
          key: ${{ runner.OS }}-x64_x86-third-party-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64_x86-third-party-

      - name: Libraries cache.
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.LibrariesPath }}\*
            !${{ env.LibrariesPath }}\cache_keys
            !${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\*
            !${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-x64_x86-libs-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64_x86-libs-

      - name: Qt cache.
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.LibrariesPath }}\[qQ]t[_-]*
            ${{ env.LibrariesPath }}\cache_keys\[qQ]t[_-]*
          key: ${{ runner.OS }}-x64_x86-qt6-${{ env.CACHE_KEY }}
          restore-keys: ${{ runner.OS }}-x64_x86-qt6-

      - name: Free disk space (Windows).
        shell: pwsh
        run: |
          # Qt 6.11 debug+release on a static-runtime build blows past the
          # ~14 GB free that windows-latest ships with. Wipe everything we
          # don't need on C: so cl.exe TEMP / PCH / Windows update don't run
          # the drive dry while the actual build lives on D:.
          # NOTE: do NOT touch C:\ProgramData\Chocolatey — that's where the
          # build prerequisites (ninja, cmake, etc.) live. Likewise leave
          # Strawberry, msys64, Miniconda alone: they're harmless and at
          # least Strawberry's perl is used by some prepare scripts.
          $targets = @(
            # Mobile/cross toolchains
            'C:\Android', 'C:\Program Files (x86)\Android', 'C:\Program Files\Google\Android',
            # JDKs we don't use
            'C:\hostedtoolcache\Java_Adopt_jdk',
            'C:\hostedtoolcache\Java_Temurin-Hotspot_jdk',
            'C:\hostedtoolcache\Java_Microsoft_jdk',
            'C:\hostedtoolcache\Java_Zulu_jdk',
            'C:\Program Files\Microsoft\jdk-*',
            # Other languages / runtimes (none of these are on prepare PATH)
            'C:\hostedtoolcache\go', 'C:\hostedtoolcache\Ruby', 'C:\hostedtoolcache\PyPy',
            'C:\hostedtoolcache\node', 'C:\hostedtoolcache\boost',
            # .NET / SQL / Mongo (not needed for native C++ build)
            'C:\Program Files\dotnet', 'C:\Program Files (x86)\dotnet',
            'C:\Program Files\MongoDB', 'C:\Program Files (x86)\MongoDB',
            'C:\Program Files\Microsoft SQL Server',
            'C:\Program Files (x86)\Microsoft SQL Server',
            'C:\Program Files (x86)\WindowsPowerShell\Modules\Az*',
            # Browsers (won't be launched by tests)
            'C:\Program Files\Mozilla Firefox',
            'C:\Program Files\Mozilla Maintenance Service',
            'C:\Program Files (x86)\Google\Chrome',
            'C:\Program Files\Google\Chrome',
            'C:\Program Files\Microsoft\Edge',
            # Selenium / browser automation
            'C:\selenium', 'C:\SeleniumWebDrivers',
            # Visual Studio bits we don't need (other workloads)
            'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\TeamFoundation',
            'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform',
            # Visual Studio installer cache — keep VS itself, drop only
            # the package cache used to repair/reinstall workloads.
            'C:\ProgramData\Package Cache',
            'C:\Users\runneradmin\.npm',
            'C:\Users\runneradmin\AppData\Local\NuGet\v3-cache',
            "$env:TEMP\*", "$env:windir\Temp\*"
          )
          foreach ($t in $targets) {
            $resolved = Resolve-Path -Path $t -ErrorAction SilentlyContinue
            foreach ($p in $resolved) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force -LiteralPath $p.Path -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive -Name C, D -ErrorAction SilentlyContinue |
              Select-Object Name, Used, Free, @{N='FreeGB';E={[math]::Round($_.Free/1GB,1)}}

      - name: Libraries.
        env:
          GYP_MSVS_OVERRIDE_PATH: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\'
          GYP_MSVS_VERSION: 2022
        run: |
          %TBUILD%\%REPO_NAME%\Telegram\build\prepare\win.bat silent qt6

      - name: Build Opengram Desktop.
        env:
          # Repo secrets, fall back to public test credentials. Test creds
          # are rate-limited on the official Telegram backend but are fine
          # against our own opengra.me server.
          TDESKTOP_API_ID: ${{ secrets.TDESKTOP_API_ID || '17349' }}
          TDESKTOP_API_HASH: ${{ secrets.TDESKTOP_API_HASH || '344583e45741c457fe1862106095a5eb' }}
        run: |
          cd %TBUILD%\%REPO_NAME%\Telegram

          call configure.bat qt6 x86 ^
          -D CMAKE_BUILD_TYPE=Release ^
          -D CMAKE_CONFIGURATION_TYPES=Release ^
          -D CMAKE_MSVC_DEBUG_INFORMATION_FORMAT= ^
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON ^
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON ^
          -D TDESKTOP_API_ID=%TDESKTOP_API_ID% ^
          -D TDESKTOP_API_HASH=%TDESKTOP_API_HASH%

          rem --parallel 2 (instead of unlimited): the Telegram target has
          rem several TUs whose temp .obj exceeds 200 MB each, and the
          rem windows-latest C: drive is too small to hold 4-8 of them
          rem simultaneously. Slower wall-clock but actually finishes.
          cmake --build ..\out --config Release --parallel 2

      - name: Package artifact.
        run: |
          set OUT=%TBUILD%\%REPO_NAME%\out\Release
          mkdir artifact
          if exist %OUT%\Opengram.exe move %OUT%\Opengram.exe artifact\
          if exist %OUT%\Telegram.exe move %OUT%\Telegram.exe artifact\Opengram.exe
          if exist %OUT%\Updater.exe move %OUT%\Updater.exe artifact\

      - uses: actions/upload-artifact@v4
        name: Upload artifact.
        with:
          name: opengram-windows-x86
          path: artifact\
          retention-days: 30

      - name: Attach to release.
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*
